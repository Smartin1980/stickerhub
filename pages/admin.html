<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin | StickerHub</title>
  <link rel="icon" href="../assets/logo-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="app-shell">
    <main class="main">
      <div class="content">
        <header class="page-heading"><div><p class="eyebrow">Verwaltung</p><h1>CSV Import</h1><p class="muted">Länder und Sticker gesammelt importieren.</p></div></header>
        <div class="grid two-column">
          <section class="card">
            <h2>Datei auswählen</h2>
            <form class="form-stack" id="import-form">
              <div class="field"><label for="csv-file">CSV-Datei</label><input class="input" id="csv-file" type="file" accept=".csv,text/csv" required></div>
              <button class="btn" type="submit">Import starten</button>
            </form>
            <p class="muted">Erwartete Spalten: <code>country_code,sticker_number</code></p>
          </section>
          <section class="card">
            <h2>Vorschau</h2>
            <div class="table-wrap"><table><thead><tr><th>Land</th><th>Nummer</th></tr></thead><tbody id="preview"></tbody></table></div>
            <div class="empty" id="preview-empty">Noch keine Datei ausgewählt.</div>
          </section>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../js/admin.js"></script>
</body>
</html>
