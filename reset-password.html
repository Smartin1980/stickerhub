<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neues Passwort | StickerHub</title>
  <link rel="icon" href="assets/logo-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <section class="auth-showcase">
    <div class="auth-showcase-content">
      <a class="brand" href="index.html"><span class="brand-mark">SH</span> StickerHub</a>
      <p class="eyebrow" style="margin-top:80px">Sicherer Zugang</p>
      <h1>Lege dein neues Passwort fest.</h1>
      <p>Danach kannst du dich wieder mit E-Mail-Adresse und Passwort anmelden.</p>
    </div>
  </section>
  <main class="auth-panel">
    <div class="auth-card">
      <a class="brand" href="index.html"><span class="brand-mark">SH</span> StickerHub</a>
      <p class="eyebrow" style="margin-top:42px">Passwort zurücksetzen</p>
      <h1>Neues Passwort</h1>
      <p class="muted" id="reset-copy">Der Wiederherstellungslink wird geprüft.</p>
      <form class="form-stack" id="reset-form" hidden>
        <div class="field">
          <label for="new-password">Neues Passwort</label>
          <input class="input" id="new-password" type="password" minlength="8"
            autocomplete="new-password" required>
        </div>
        <div class="field">
          <label for="confirm-password">Passwort wiederholen</label>
          <input class="input" id="confirm-password" type="password" minlength="8"
            autocomplete="new-password" required>
        </div>
        <button class="btn" id="reset-submit" type="submit">Passwort speichern</button>
      </form>
      <a class="btn btn-ghost" id="back-to-login" href="login.html"
        style="width:100%;margin-top:12px" hidden>Zurück zum Login</a>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/reset-password.js?v=20260608-2"></script>
</body>
</html>
